zabbix_export:
  version: '7.0'
  media_types:
    - name: 'MAX'
      type: WEBHOOK
      parameters:
        - name: ChatId
          value: ''
        - name: UserId
          value: '{ALERT.SENDTO}'
        - name: Message
          value: '{ALERT.MESSAGE}'
        - name: Format
          value: 'html'
        - name: Subject
          value: '{ALERT.SUBJECT}'
        - name: Token
          value: '{TOKEN.SUBJECT}'
      script: |
        var MAX = {
            token: null,
            user_id: null,
            chat_id: null,
            text: null,
            format: null,
            disable_link_preview: null,
            notify: null,
            sendMessage: function () {
                var request = new HttpRequest(),
                    url = 'https://platform-api.max.ru/messages',
                    query = [],
                    data,
                    response;
                if (MAX.user_id) {
                    query.push('user_id=' + encodeURIComponent(MAX.user_id));
                }
                if (MAX.chat_id) {
                    query.push('chat_id=' + encodeURIComponent(MAX.chat_id));
                }
                if (query.length > 0) {
                    url += '?' + query.join('&');
                }
                request.addHeader('Content-Type: application/json');
                request.addHeader('Authorization: ' + MAX.token);
                var body = {
                    text: MAX.text
                };
                if (MAX.format !== null) {
                    body.format = MAX.format;
                }
                if (MAX.disable_link_preview !== null) {
                    body.disable_link_preview = MAX.disable_link_preview;
                }
                if (MAX.notify !== null) {
                    body.notify = MAX.notify;
                }
                data = JSON.stringify(body);
                Zabbix.Log(4, '[ MAX webhook ] URL: ' + url);
                Zabbix.Log(4, '[ MAX webhook ] body: ' + data);
                response = request.post(url, data);
                Zabbix.Log(4, '[ MAX webhook ] HTTP code: ' + request.getStatus());
                Zabbix.Log(4, '[ MAX webhook ] Raw response: ' + response);
                if (request.getStatus() !== 200) {
                    var errBody = '';
                    try {
                        var errParsed = JSON.parse(response);
                        errBody = errParsed.message || errParsed.error || JSON.stringify(errParsed);
                    } catch (e) {
                        errBody = response;
                    }
                    throw 'HTTP ' + request.getStatus() + ': ' + errBody;
                }
                try {
                    response = JSON.parse(response);
                }
                catch (error) {
                    throw 'Invalid JSON in response: ' + error;
                }
                if (typeof response.message === 'undefined') {
                    throw 'Unexpected response: ' + JSON.stringify(response);
                }
            }
        };
        try {
            var params = JSON.parse(value);
        
            if (typeof params.Token === 'undefined' || params.Token === '') {
                throw 'Incorrect value is given for parameter "Token": parameter is missing';
            }
            MAX.token = params.Token;
            if (typeof params.UserId !== 'undefined' && params.UserId !== '' && typeof params.ChatId !== 'undefined' && params.ChatId !== '') {
                throw 'Both "UserId" and "ChatId" are specified: use only one';
            }
            if ((typeof params.UserId === 'undefined' || params.UserId === '') && (typeof params.ChatId === 'undefined' || params.ChatId === '')) {
                throw 'Neither "UserId" nor "ChatId" parameter is specified';
            }
            if (typeof params.UserId !== 'undefined' && params.UserId !== '') {
                MAX.user_id = params.UserId;
            }
            if (typeof params.ChatId !== 'undefined' && params.ChatId !== '') {
                MAX.chat_id = params.ChatId;
            }
            MAX.text = params.Subject + '\n' + params.Message;
            if (typeof params.Format !== 'undefined' && params.Format !== '') {
                var allowedFormats = ['markdown', 'html'];
                if (allowedFormats.indexOf(params.Format) === -1) {
                    throw 'Incorrect value is given for parameter "Format": must be "markdown" or "html"';
                }
                MAX.format = params.Format;
            }
            if (typeof params.DisableLinkPreview !== 'undefined' && params.DisableLinkPreview !== '') {
                MAX.disable_link_preview = (params.DisableLinkPreview === 'true' || params.DisableLinkPreview === '1');
            }
            if (typeof params.Notify !== 'undefined' && params.Notify !== '') {
                MAX.notify = (params.Notify === 'true' || params.Notify === '1');
            }
            MAX.sendMessage();
            return 'OK';
        }
        catch (error) {
            Zabbix.Log(4, '[ MAX webhook ] notification failed: ' + error);
            throw 'Sending failed: ' + error + '.';
        }
      timeout: 10s
      description: |
        Github: https://github.com/noakky/zabbix-media-max

        Токен бота MAX:
        Чат-бот и мини-приложение → Интеграция → Получить токен

        Параметры при настройке оповещения:
        - Token: токен бота
        - UserId: ID пользователя (заполнить ChatId либо UserId — не оба!)
        - ChatId: ID группового чата
      message_templates:
        - event_source: TRIGGERS
          operation_mode: PROBLEM
          subject: '{EVENT.SEVERITY}: {EVENT.NAME}'
          message: |
            Started at {EVENT.TIME} on {EVENT.DATE} ({EVENT.OPDATA})
            {HOST.NAME}
        - event_source: TRIGGERS
          operation_mode: RECOVERY
          subject: '✅ {EVENT.DURATION}: {EVENT.RECOVERY.NAME}'
          message: '{HOST.NAME} in {EVENT.DURATION} at {EVENT.RECOVERY.TIME} {EVENT.RECOVERY.DATE} ({EVENT.OPDATA})'
        - event_source: TRIGGERS
          operation_mode: UPDATE
          subject: '✏️ {EVENT.NAME}'
          message: |
            {USER.FULLNAME} {HOST.NAME} {EVENT.UPDATE.ACTION} {EVENT.UPDATE.DATE} {EVENT.UPDATE.TIME}.
            {EVENT.UPDATE.MESSAGE}
        - event_source: DISCOVERY
          operation_mode: PROBLEM
          subject: 'Discovery: {DISCOVERY.DEVICE.STATUS} {DISCOVERY.DEVICE.IPADDRESS}'
          message: |
            Discovery rule: {DISCOVERY.RULE.NAME}
            
            Device IP: {DISCOVERY.DEVICE.IPADDRESS}
            Device DNS: {DISCOVERY.DEVICE.DNS}
            Device status: {DISCOVERY.DEVICE.STATUS}
            Device uptime: {DISCOVERY.DEVICE.UPTIME}
            
            Device service name: {DISCOVERY.SERVICE.NAME}
            Device service port: {DISCOVERY.SERVICE.PORT}
            Device service status: {DISCOVERY.SERVICE.STATUS}
            Device service uptime: {DISCOVERY.SERVICE.UPTIME}
        - event_source: AUTOREGISTRATION
          operation_mode: PROBLEM
          subject: 'Autoregistration: {HOST.HOST}'
          message: |
            Host name: {HOST.HOST}
            Host IP: {HOST.IP}
            Agent port: {HOST.PORT}
